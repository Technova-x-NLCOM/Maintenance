<div class="sidebar" [class.mobile-open]="isMobile && mobileOpen">
  <div class="sidebar-header">
    <button class="mobile-close" type="button" *ngIf="isMobile" (click)="onNavItemClick()" aria-label="Close sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <p class="menu-caption">MAIN MENU</p>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard"
       [class.active]="isDashboardNavActive()"
      (click)="onNavItemClick()"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="label">Dashboard</span>
    </a>

    <div class="nav-group" *ngIf="hasPermission('manage_inventory') || hasPermission('manage_categories') || hasPermission('manage_maintenance')">
      <button class="nav-group-toggle" (click)="toggleGroup('inventory')" [class.expanded]="isGroupOpen('inventory')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7h6v6H3z"/>
          <path d="M10.5 7h4.5v6h-4.5z"/>
          <path d="M16.5 7H21v6h-4.5z"/>
        </svg>
        <span class="label">Inventory</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="nav-group-items" [class.open]="isGroupOpen('inventory')">
        <a routerLink="/dashboard/maintenance/items" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="onNavItemClick()" class="nav-sub-item">
          <span class="sub-dot"></span>
          <span class="label">All Items</span>
        </a>
        <a *ngIf="user?.role === 'super_admin'" routerLink="/dashboard/inventory/categories" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="onNavItemClick()" class="nav-sub-item">
          <span class="sub-dot"></span>
          <span class="label">Categories</span>
        </a>
        <a routerLink="/dashboard/maintenance/inventory_batches" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="onNavItemClick()" class="nav-sub-item">
          <span class="sub-dot"></span>
          <span class="label">Batches</span>
        </a>
        <a routerLink="/dashboard/maintenance/inventory_snapshots" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="onNavItemClick()" class="nav-sub-item">
          <span class="sub-dot"></span>
          <span class="label">Snapshots</span>
        </a>
      </div>
    </div>

     <a *ngIf="hasPermission('manage_inventory') || hasPermission('manage_maintenance')"
       routerLink="/dashboard/maintenance/inventory_transactions" 
      routerLinkActive="active" 
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 3l4 4-4 4"/>
        <path d="M3 7h18"/>
        <path d="M7 21l-4-4 4-4"/>
        <path d="M21 17H3"/>
      </svg>
      <span class="label">Transactions</span>
    </a>

     <a *ngIf="hasPermission('manage_inventory') || hasPermission('manage_maintenance')"
       routerLink="/dashboard/maintenance/expiry_alerts" 
      routerLinkActive="active" 
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 9v4"/>
        <path d="M12 17h.01"/>
        <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      </svg>
      <span class="label">Expiry Alerts</span>
      <span class="nav-badge" *ngIf="alertsCount > 0">{{ alertsCount }}</span>
    </a>

     <a *ngIf="hasPermission('manage_inventory') || hasPermission('manage_maintenance')"
       routerLink="/dashboard/reports"
       routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span class="label">Reports</span>
    </a>

     <a *ngIf="user?.role === 'super_admin'"
      routerLink="/dashboard/maintenance/users"
       routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="label">User Management</span>
    </a>

    <a *ngIf="user?.role === 'super_admin'"
      routerLink="/dashboard/settings"
       routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
     (click)="onNavItemClick()"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <span class="label">Settings</span>
    </a>

  </nav>

  <div class="sidebar-footer">
    <div class="user-section">
      <div class="user-info" *ngIf="user">
        <div class="user-details">
          <p class="user-name">{{ user.first_name }} {{ user.last_name }}</p>
          <p class="user-email">{{ user.email }}</p>
        </div>
        <button class="logout-btn" (click)="openLogoutModal()" title="Logout">
          <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal-overlay" *ngIf="showLogoutModal" (click)="closeLogoutModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
    <h2 class="modal-title">Confirm Logout</h2>
    <p class="modal-message">Are you sure you want to log out of your account?</p>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeLogoutModal()">Cancel</button>
      <button class="btn-confirm" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
