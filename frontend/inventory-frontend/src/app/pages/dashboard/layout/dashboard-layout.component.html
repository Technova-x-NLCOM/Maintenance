<div class="dashboard-container" (window:resize)="onResize()">
  <app-toast-outlet></app-toast-outlet>
  <app-sidebar
    [user]="currentUser"
    [isMobile]="isMobile"
    [mobileOpen]="mobileSidebarOpen"
    (navigateItem)="closeMobileSidebar()">
  </app-sidebar>
  <div class="sidebar-backdrop" *ngIf="isMobile && mobileSidebarOpen" (click)="closeMobileSidebar()"></div>
  <div class="dashboard-main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" type="button" *ngIf="isMobile" (click)="toggleMobileSidebar()" aria-label="Open sidebar menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="page-context">
          <h1 class="page-title">{{ pageTitle }}</h1>
          <p class="breadcrumb">{{ breadcrumb }}</p>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="topbar-action-host">
          <button
            class="topbar-icon"
            type="button"
            title="Notifications"
            aria-label="Notifications"
            [attr.aria-expanded]="notificationOpen"
            (click)="toggleNotifications($event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span class="dot" *ngIf="expiryAlertTotal > 0" aria-hidden="true"></span>
          </button>
          <div class="dropdown-panel notification-panel" *ngIf="notificationOpen" role="dialog" aria-label="Notifications">
            <p class="dropdown-title">Notifications</p>
            <div class="dropdown-body">
              <p class="dropdown-muted" *ngIf="loadingNotifications">Loading…</p>
              <ng-container *ngIf="!loadingNotifications">
                <a
                  *ngIf="expiryAlertTotal > 0"
                  class="dropdown-link"
                  routerLink="/dashboard/maintenance/expiry_alerts"
                  (click)="closePanels()">
                  <strong>{{ expiryAlertTotal }}</strong> open expiry alert<span *ngIf="expiryAlertTotal !== 1">s</span>
                </a>
                <p class="dropdown-muted" *ngIf="expiryAlertTotal === 0">No open expiry alerts.</p>
                <a class="dropdown-link secondary" routerLink="/dashboard/reports" (click)="closePanels()">View reports</a>
              </ng-container>
            </div>
          </div>
        </div>

        <button
          class="topbar-icon"
          type="button"
          title="Print this page"
          aria-label="Print this page"
          (click)="onPrintClick($event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
        </button>
      </div>
    </header>
    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
