<div class="settings-page">
  <div *ngIf="loading" class="state state-loading">Loading settings...</div>
  <div *ngIf="error" class="state state-error">{{ error }}</div>

  <div *ngIf="!loading && !error" class="settings-card">
    <h3 class="card-title">System Settings</h3>

    <section class="section">
      <h4>Alerts &amp; Thresholds</h4>
      <div class="setting-row" *ngFor="let field of alertsFields">
        <div>
          <p class="label">{{ field.label }}</p>
          <p class="hint">{{ field.hint }}</p>
        </div>
        <div class="control">
          <input
            *ngIf="field.type === 'number'"
            type="number"
            [ngModel]="field.value"
            (ngModelChange)="onNumberChange(field, $event)"
          />
        </div>
      </div>
    </section>

    <section class="section">
      <h4>Approval Settings</h4>
      <div class="setting-row" *ngFor="let field of approvalFields">
        <div>
          <p class="label">{{ field.label }}</p>
          <p class="hint">{{ field.hint }}</p>
        </div>
        <div class="control">
          <label class="switch">
            <input type="checkbox" [checked]="!!field.value" (change)="onToggleChange(field)" />
            <span></span>
          </label>
        </div>
      </div>
    </section>

    <section class="section">
      <h4>Monthly Snapshots</h4>
      <div class="setting-row" *ngFor="let field of snapshotFields">
        <div>
          <p class="label">{{ field.label }}</p>
          <p class="hint">{{ field.hint }}</p>
        </div>
        <div class="control">
          <label class="switch">
            <input type="checkbox" [checked]="!!field.value" (change)="onToggleChange(field)" />
            <span></span>
          </label>
        </div>
      </div>
    </section>

    <button class="save-btn" [disabled]="saving" (click)="saveSettings()">{{ saving ? 'Saving...' : 'Save Settings' }}</button>
  </div>
</div>
