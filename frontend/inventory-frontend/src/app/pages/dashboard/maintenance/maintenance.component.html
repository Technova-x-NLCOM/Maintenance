<div class="maintenance">
  <div class="sidebar">
    <h3>Tables</h3>
    <ul>
      <li *ngFor="let t of tables" [class.active]="selectedTable === t.name" (click)="selectTable(t.name)">
        {{ t.name }}
      </li>
    </ul>
  </div>

  <div class="content" *ngIf="selectedTable">
    <div class="toolbar">
      <h3>{{ selectedTable }}</h3>
      <label>
        <input type="checkbox" [(ngModel)]="showDeleted" (change)="fetchRows()" /> Show deleted
      </label>
    </div>

    <div *ngIf="schema" class="new-row">
      <h4>Create New</h4>
      <div class="grid">
        <ng-container *ngFor="let c of schema.columns">
          <div *ngIf="c !== schema.primary_key && c !== 'deleted_at'" class="field">
            <label>{{ c }}</label>
            <input [(ngModel)]="newRow[c]" />
          </div>
        </ng-container>
      </div>
      <button (click)="createRow()">Create</button>
    </div>

    <div class="rows" *ngIf="rows.length">
      <table>
        <thead>
          <tr>
            <th *ngFor="let c of schema?.columns">{{ c }}</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of rows">
            <td *ngFor="let c of schema?.columns">
              <ng-container *ngIf="editingRow && pkKey && editingRow[pkKey] === row[pkKey]; else viewCell">
                <input *ngIf="c !== pkKey && c !== 'deleted_at'" [(ngModel)]="editingRow[c]" />
                <span *ngIf="c === pkKey || c === 'deleted_at'">{{ row[c] }}</span>
              </ng-container>
              <ng-template #viewCell>
                {{ row[c] }}
              </ng-template>
            </td>
            <td class="actions">
              <ng-container *ngIf="editingRow && pkKey && editingRow[pkKey] === row[pkKey]; else actionButtons">
                <button (click)="saveEdit()">Save</button>
                <button (click)="cancelEdit()">Cancel</button>
              </ng-container>
              <ng-template #actionButtons>
                <button (click)="startEdit(row)">Edit</button>
                <button (click)="deleteRow(row)">{{ schema?.soft_deletes ? 'Soft Delete' : 'Delete' }}</button>
                <button *ngIf="schema?.soft_deletes && row['deleted_at']" (click)="restoreRow(row)">Restore</button>
              </ng-template>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="!rows.length && !loading" class="empty">No rows</div>
    <div *ngIf="loading" class="loading">Loading...</div>
  </div>
</div>
