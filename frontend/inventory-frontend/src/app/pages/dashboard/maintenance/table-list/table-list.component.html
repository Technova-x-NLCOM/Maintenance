<div class="table-list">
  <div class="list-header">
    <button class="back-btn" (click)="goBack()">← Back</button>
    <h2>{{ selectedTable }}</h2>
    <button class="add-btn" (click)="goToForm(null)">+ Add New</button>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <label>
        <input type="checkbox" [(ngModel)]="showDeleted" (change)="fetchRows()" />
        Show deleted
      </label>
    </div>
    <div class="toolbar-right">
      <button class="column-toggle-btn" (click)="toggleColumnSelector()">
        <span class="icon">⚙️</span>
        Columns
      </button>
    </div>
  </div>

  <div class="column-selector" *ngIf="columnSelectorOpen">
    <div class="column-selector-header">Show/Hide Columns</div>
    <div class="column-list">
      <label *ngFor="let col of schema?.columns" class="column-option">
        <input type="checkbox" [checked]="isColumnVisible(col)" (change)="toggleColumnVisibility(col)" />
        <span class="column-name">{{ col }}</span>
      </label>
    </div>
    <button class="close-selector-btn" (click)="toggleColumnSelector()">Done</button>
  </div>

  <div *ngIf="schema && rows.length" class="rows-container">
    <table>
      <thead>
        <tr>
          <th *ngFor="let c of getVisibleColumns()">{{ c }}</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td *ngFor="let c of getVisibleColumns()">{{ formatCell(c, row) }}</td>
          <td class="actions">
            <button class="edit-btn" (click)="goToForm(row)">Edit</button>
            <button class="delete-btn" (click)="deleteRow(row)">
              {{ schema.soft_deletes ? 'Soft Delete' : 'Delete' }}
            </button>
            <button *ngIf="schema.soft_deletes && row['deleted_at']" class="restore-btn" (click)="restoreRow(row)">
              Restore
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="!rows.length && !loading" class="empty">No rows found</div>
  <div *ngIf="loading" class="loading">Loading...</div>

  <div class="pagination" *ngIf="totalPages > 1">
    <button (click)="previousPage()" [disabled]="currentPage === 1">Previous</button>
    <span class="page-info">Page {{ currentPage }} of {{ totalPages }} ({{ total }} total)</span>
    <button (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
  </div>
</div>
