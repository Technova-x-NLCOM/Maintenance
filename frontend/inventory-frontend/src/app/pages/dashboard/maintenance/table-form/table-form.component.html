<div class="table-form">
  <div class="form-header">
    <button class="back-btn" (click)="goBack()">← Back</button>
    <h2>{{ isNew ? 'Create' : 'Edit' }} {{ selectedTable }}</h2>
  </div>

  <form (ngSubmit)="onSubmit()" class="form-container">
    <div class="form-grid">
      <div *ngFor="let col of schema?.columns" class="form-group" [class.readonly]="isReadonly(col)">
        <label [for]="col">{{ col }}</label>
        <input
          *ngIf="!isReadonly(col)"
          [id]="col"
          type="text"
          [(ngModel)]="formData[col]"
          [name]="col"
          placeholder="Enter {{ col }}"
        />
        <div *ngIf="isReadonly(col)" class="readonly-value">
          {{ formData[col] || '—' }}
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="cancel-btn" (click)="goBack()">Cancel</button>
      <button type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </form>
</div>
