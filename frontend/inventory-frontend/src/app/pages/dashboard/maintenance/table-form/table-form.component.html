<div class="table-form">
  <div class="form-header">
    <button class="back-btn" *ngIf="!modalMode" (click)="goBack()" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </button>
    <div class="header-title">
      <h1 class="page-title">{{ isNew ? 'Add new' : 'Edit' }} {{ getFriendlyTableName().toLowerCase() }}</h1>
      <p class="header-subtitle" *ngIf="isNew">Fill in the fields below. Fields marked with * are required.</p>
      <p class="header-subtitle" *ngIf="!isNew">Update the fields below and save.</p>
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" class="form-container">
    <!-- Success Message -->
    <div class="message success-message" *ngIf="successMessage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      {{ successMessage }}
    </div>
    
    <!-- Error Message -->
    <div class="message error-message" *ngIf="errorMessage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      {{ errorMessage }}
    </div>
    
    <div class="form-grid">
      <ng-container *ngFor="let col of schema?.columns">
        <div *ngIf="!isHiddenFromForm(col)"
             class="form-group" 
             [class.readonly]="isReadonly(col)"
             [class.full-width]="isFullWidth(col)">
          <label [for]="col">
          {{ getFriendlyColumnName(col) }}
          <span *ngIf="isRequired(col)" class="required-indicator">*</span>
        </label>
        <p class="field-description" *ngIf="getColumnDescription(col)">
          {{ getColumnDescription(col) }}
        </p>

        <!-- Readonly fields display -->
        <div *ngIf="isReadonly(col)" class="readonly-value">
          {{ formatReadonlyValue(col, formData[col]) }}
        </div>

        <!-- Foreign Key dropdown -->
        <select
          *ngIf="!isReadonly(col) && isForeignKey(col)"
          [id]="col"
          [(ngModel)]="formData[col]"
          [name]="col"
          [required]="isRequired(col)"
          class="fk-select"
        >
          <option [value]="null">-- Select {{ getFriendlyColumnName(col) }} --</option>
          <option *ngFor="let opt of getForeignKeyOptions(col)" [value]="opt.id">
            {{ opt.label }}
          </option>
        </select>

        <!-- Boolean/Select input with Yes/No options -->
        <select
          *ngIf="!isReadonly(col) && !isForeignKey(col) && !isEnumField(col) && isBooleanField(col)"
          [id]="col"
          [(ngModel)]="formData[col]"
          [name]="col"
          class="boolean-select"
        >
          <option [ngValue]="null">-- Select --</option>
          <option [ngValue]="1">Yes</option>
          <option [ngValue]="0">No</option>
        </select>

        <!-- ENUM dropdown -->
        <select
          *ngIf="!isReadonly(col) && !isForeignKey(col) && isEnumField(col)"
          [id]="col"
          [(ngModel)]="formData[col]"
          [name]="col"
          [required]="isRequired(col)"
          class="enum-select"
        >
          <option [ngValue]="null">-- Select {{ getFriendlyColumnName(col) }} --</option>
          <option *ngFor="let opt of getEnumOptions(col)" [value]="opt">
            {{ formatEnumLabel(opt) }}
          </option>
        </select>

        <!-- Date input -->
        <input
          *ngIf="!isReadonly(col) && !isForeignKey(col) && !isEnumField(col) && !isBooleanField(col) && isDateField(col)"
          [id]="col"
          type="date"
          [(ngModel)]="formData[col]"
          [name]="col"
          [required]="isRequired(col)"
          [placeholder]="getColumnPlaceholder(col)"
        />

        <!-- Number input -->
        <input
          *ngIf="!isReadonly(col) && !isForeignKey(col) && !isEnumField(col) && !isBooleanField(col) && !isDateField(col) && isNumberField(col)"
          [id]="col"
          type="number"
          [(ngModel)]="formData[col]"
          [name]="col"
          [required]="isRequired(col)"
          [placeholder]="getColumnPlaceholder(col)"
          step="any"
        />

        <!-- Textarea for long text -->
        <textarea
          *ngIf="!isReadonly(col) && !isForeignKey(col) && !isEnumField(col) && !isBooleanField(col) && !isDateField(col) && !isNumberField(col) && isTextArea(col)"
          [id]="col"
          [(ngModel)]="formData[col]"
          [name]="col"
          [required]="isRequired(col)"
          [placeholder]="getColumnPlaceholder(col)"
          rows="3"
        ></textarea>

        <!-- Regular text input -->
        <input
          *ngIf="!isReadonly(col) && !isForeignKey(col) && !isEnumField(col) && !isBooleanField(col) && !isDateField(col) && !isNumberField(col) && !isTextArea(col)"
          [id]="col"
          type="text"
          [(ngModel)]="formData[col]"
          [name]="col"
          [required]="isRequired(col)"
          [placeholder]="getColumnPlaceholder(col)"
        />
        </div>
      </ng-container>
    </div>

    <div class="form-actions">
      <button type="button" class="cancel-btn" (click)="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        {{ modalMode ? 'Close' : 'Cancel' }}
      </button>
      <button type="submit" class="submit-btn" [disabled]="loading">
        <svg *ngIf="!loading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        <svg *ngIf="loading" class="spinning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
        {{ loading ? 'Saving...' : 'Save' }}
      </button>
    </div>
  </form>
</div>
