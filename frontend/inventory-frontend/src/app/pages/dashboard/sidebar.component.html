<div class="sidebar">
  <!-- Logo Section -->
  <div class="sidebar-header">
    <div class="logo-placeholder"></div>
    <span class="system-name">NLCOM IMS</span>
  </div>

  <div class="header-divider"></div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav">
    <a routerLink="/dashboard/home" 
       routerLinkActive="active" 
       [routerLinkActiveOptions]="{ exact: true }"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="label">Dashboard</span>
    </a>

    <a routerLink="/dashboard/profile" 
       routerLinkActive="active" 
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="7" r="4"/>
        <path d="M5.5 21a7.5 7.5 0 0 1 13 0"/>
      </svg>
      <span class="label">Profile</span>
    </a>

    <!-- Backup (Admin & Super Admin Only) -->
    <a *ngIf="hasPermission('manage_backups')"
       routerLink="/dashboard/backup" 
       routerLinkActive="active" 
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span class="label">Backups</span>
    </a>

    <!-- Maintenance (Admin & Super Admin Only) -->
    <a *ngIf="hasPermission('manage_maintenance')"
       routerLink="/dashboard/maintenance"
       routerLinkActive="active"
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      <span class="label">Maintenance</span>
    </a>

    <!-- Super Admin Only -->
    <a *ngIf="hasPermission('manage_permissions') || hasPermission('manage_roles')"
       routerLink="/dashboard/roles" 
       routerLinkActive="active" 
       class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="label">Roles & Permissions</span>
    </a>
  </nav>

  <!-- User Info & Logout at Bottom -->
  <div class="sidebar-footer">
    <div class="footer-divider"></div>
    <div class="user-section">
      <div class="user-info" *ngIf="user">
        <div class="user-details">
          <p class="user-name">{{ user.first_name }} {{ user.last_name }}</p>
          <p class="user-email">{{ user.email }}</p>
        </div>
        <button class="logout-btn" (click)="openLogoutModal()" title="Logout">
          <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Logout Confirmation Modal -->
<div class="modal-overlay" *ngIf="showLogoutModal" (click)="closeLogoutModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
    <h2 class="modal-title">Confirm Logout</h2>
    <p class="modal-message">Are you sure you want to log out of your account?</p>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeLogoutModal()">Cancel</button>
      <button class="btn-confirm" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
