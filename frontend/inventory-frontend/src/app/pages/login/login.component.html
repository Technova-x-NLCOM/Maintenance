<div class="login-container">
  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <div class="logo-section">
        <div class="heart-logo">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
        <h1>Humanitarian Relief</h1>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access the system</p>
    </div>

    <!-- Error Message -->
    <div class="error-message" *ngIf="errorMessage">
      <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="identifier">Username or Email</label>
        <input
          type="text"
          id="identifier"
          formControlName="identifier"
          placeholder="Enter your username or email"
          class="form-control"
        />
        <span class="error" *ngIf="loginForm.get('identifier')?.invalid && loginForm.get('identifier')?.touched">
          Please enter your username or email
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            class="form-control"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            title="Toggle password visibility">
            <svg *ngIf="!showPassword" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password must be at least 6 characters
        </span>
      </div>

      <!-- <div class="form-group checkbox">
        <input
          type="checkbox"
          id="rememberMe"
          formControlName="rememberMe"
        />
        <label for="rememberMe">Remember me</label>
      </div> -->

      <button
        type="submit"
        class="btn btn-primary btn-login"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="demo-section">
      <p class="demo-note">
        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Tip: Click on a demo account above to fill in the credentials instantly!
      </p>
    <!-- Role Tabs -->
    <div class="demo-accounts-section">
      <p class="demo-title">Demo Accounts</p>
      <div class="demo-list">
        <button 
          type="button"
          class="demo-account-card"
          *ngFor="let account of demoAccounts"
          (click)="fillDemoCredentials(account)"
          title="Click to fill credentials">
          <div class="demo-icon">{{ account.icon }}</div>
          <div class="demo-info">
            <div class="demo-role">{{ account.role }}</div>
            <div class="demo-desc">{{ account.description }}</div>
            <div class="demo-creds">
              <span class="cred">{{ account.identifier }}</span>
            </div>
          </div>
        </button>
      </div>
    </div>
    </div>

    <!-- Links -->
    <div class="form-footer">
      <a href="#forgot-password" class="link">Forgot Password?</a>
      <span class="divider">•</span>
      <a routerLink="/signup" class="link">Create Account</a>
    </div>

    <!-- Back to Home -->
    <div class="back-home">
      <a routerLink="/" class="link-home">← Back to Home</a>
    </div>
  </div>
</div>
