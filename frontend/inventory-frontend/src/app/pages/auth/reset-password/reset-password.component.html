<div class="reset-page">
  <div class="reset-panel">
    <div class="brand-badge">
      <img src="assets/logo.png" alt="NLCOM Logo" />
      <span>Password Reset</span>
    </div>

    <h1>Choose a new password</h1>
    <p class="subtitle">
      Enter a new password for <strong>{{ email || 'your account' }}</strong>.
    </p>

    <div class="status-card error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="status-card success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <form *ngIf="isValidLink" [formGroup]="resetForm" (ngSubmit)="submit()" class="reset-form">
      <div class="form-group">
        <label for="password">New Password</label>
        <div class="password-field">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your new password"
            autocomplete="new-password"
          />
          <button type="button" class="visibility-toggle" (click)="togglePasswordVisibility()">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <small *ngIf="resetForm.get('password')?.touched && resetForm.get('password')?.invalid">
          Password must be at least 8 characters long.
        </small>
      </div>

      <div class="form-group">
        <label for="password_confirmation">Confirm Password</label>
        <div class="password-field">
          <input
            id="password_confirmation"
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="password_confirmation"
            placeholder="Confirm your new password"
            autocomplete="new-password"
          />
          <button type="button" class="visibility-toggle" (click)="toggleConfirmPasswordVisibility()">
            {{ showConfirmPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <div *ngIf="!isValidLink" class="actions">
      <a routerLink="/login" class="back-link">Back to Login</a>
    </div>
  </div>
</div>
