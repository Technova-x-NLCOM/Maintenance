<header class="app-header">
  <div class="header-left">
    <button class="menu-btn" type="button" (click)="toggleMenu()" aria-label="Open menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="header-right">
    <!-- Fullscreen toggle -->
    <button
      class="header-btn"
      type="button"
      (click)="toggleFullscreen()"
      [title]="isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen'"
      [attr.aria-label]="isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen'"
    >
      <!-- Expand icon -->
      <svg *ngIf="!isFullscreen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <!-- Compress icon -->
      <svg *ngIf="isFullscreen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="3" y2="21"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
      </svg>
    </button>

    <!-- Future header items go here -->
  </div>
</header>
