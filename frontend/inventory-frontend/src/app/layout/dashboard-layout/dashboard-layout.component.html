<div class="dashboard-container">
  <div class="sidebar-backdrop" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>
  <div class="sidebar-shell" [class.is-open]="sidebarOpen">
    <app-sidebar [user]="currentUser" (closeRequested)="closeSidebar()"></app-sidebar>
  </div>
  <div class="dashboard-main">
    <app-header (menuToggle)="toggleSidebar()"></app-header>
    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
